<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>フォーム解析テスト - LOCLE営業ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --green-500: #44B13F; --green-700: #2F8A2A;
    --green-50: #f0faf0;  --green-100: #d8f0d8;
    --gray-50: #f8fafc;   --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;  --gray-300: #cbd5e1;
    --gray-400: #94a3b8;  --gray-500: #64748b;
    --gray-700: #334155;  --gray-900: #0f172a;
    --white: #ffffff;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
    --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; }
  body { font-family: "Inter", "Noto Sans JP", sans-serif; background: var(--gray-50); margin: 0; color: var(--gray-900); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .main-content { animation: fadeInUp 0.4s ease-out; }

  .page-header {
    background: linear-gradient(135deg, #2F8A2A 0%, #44B13F 50%, #5BC952 100%);
    border-bottom: none; box-shadow: 0 2px 8px rgba(47,138,42,0.3);
    padding: 0 24px; display: flex; align-items: center; gap: 16px;
    height: 56px; position: sticky; top: 0; z-index: 100;
  }
  .page-header h1 {
    margin: 0; font-size: 15px; font-weight: 700; color: var(--white);
    flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  }
  .page-header h1 svg { width: 18px; height: 18px; }
  .page-nav { display: flex; gap: 2px; margin-left: auto; flex-wrap: wrap; }
  .page-nav a {
    color: rgba(255,255,255,0.75); font-size: 13px; font-weight: 500;
    text-decoration: none; white-space: nowrap;
    padding: 6px 10px; border-radius: var(--radius-sm); transition: all 150ms;
  }
  .page-nav a:hover { color: white; background: rgba(255,255,255,0.15); }
  .page-nav a.active {
    color: white; font-weight: 600;
    background: rgba(255,255,255,0.15); border-bottom: 2px solid white; padding-bottom: 4px;
  }

  .main-content { max-width: 680px; margin: 32px auto; padding: 0 16px; }

  .page-card {
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 28px;
    transition: box-shadow 200ms ease;
  }
  .page-card:hover { box-shadow: var(--shadow-md); }
  .page-card h2 { margin: 0 0 6px; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .page-card p  { margin: 0 0 20px; font-size: 14px; color: var(--gray-500); line-height: 1.6; }

  input[type="url"] {
    width: 100%; padding: 8px 12px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
    transition: border-color 150ms; background: var(--white); color: var(--gray-900);
  }
  input[type="url"]:focus {
    outline: none; border-color: var(--green-500); box-shadow: 0 0 0 3px var(--green-100);
  }
  button {
    margin-top: 10px; padding: 8px 16px;
    background: linear-gradient(135deg, #44B13F, #2F8A2A);
    box-shadow: 0 4px 12px rgba(68,177,63,0.3);
    color: var(--white); border: none; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: inherit; transition: all 150ms ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  button:hover:not(:disabled) {
    background: linear-gradient(135deg, #3da038, #277025);
    transform: translateY(-1px); box-shadow: 0 6px 16px rgba(68,177,63,0.4);
  }
  button:disabled { background: var(--gray-300); box-shadow: none; cursor: not-allowed; transform: none; }
  button svg { width: 14px; height: 14px; }

  .status { margin-top: 14px; font-size: 13px; color: var(--gray-500); min-height: 20px; }
  pre {
    margin-top: 16px; background: var(--gray-50); border: 1px solid var(--gray-200);
    padding: 14px; border-radius: var(--radius-md); overflow-x: auto;
    font-size: 12px; white-space: pre-wrap; word-break: break-all;
    color: var(--gray-700); line-height: 1.6;
  }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .ok { background: var(--green-50); color: var(--green-700); }
  .ng { background: #fff5f5; color: #dc2626; }

  @media (max-width: 600px) {
    .page-header { padding: 0 12px; }
    .page-nav { overflow-x: auto; padding-bottom: 2px; }
    .main-content { padding: 0 8px; margin: 16px auto; }
    input[type="url"] { font-size: 16px; }
    button { min-height: 44px; width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<header class="page-header">
  <h1><a href="/index.html" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
    <img src="/logo.jpg" alt="LOCLE" style="height:32px; width:auto; object-fit:contain; filter:brightness(0) invert(1);">
    <span style="color:white; font-weight:700; font-size:15px; letter-spacing:0.02em;">営業ツール</span>
  </a></h1>
  <nav class="page-nav">
    <a href="/index.html">ホーム</a>
    <a href="/companies.html">企業リスト</a>
    <a href="/variants.html">メッセージ管理</a>
    <a href="/send.html">送信管理</a>
    <a href="/analytics.html">分析</a>
  </nav>
</header>
<div class="main-content">
  <div class="page-card">
    <h2>フォーム解析テスト</h2>
    <p>企業サイトのURLを入力すると、お問い合わせフォームを探してフィールド構成と自動化可否を判定します。</p>
    <input type="url" id="urlInput" placeholder="https://example.co.jp" />
    <br />
    <button id="runBtn"><i data-lucide="search"></i>解析する</button>
    <div class="status" id="status"></div>
    <pre id="result"></pre>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  const btn     = document.getElementById("runBtn");
  const input   = document.getElementById("urlInput");
  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");

  btn.addEventListener("click", async () => {
    const url = input.value.trim();
    if (!url) { statusEl.textContent = "URLを入力してください"; return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>解析中...';
    statusEl.textContent = "ヘッドレスブラウザでページを読み込んでいます。数秒~20秒程度かかります";
    resultEl.textContent = "";

    try {
      const res  = await fetch("/api/analyze-form", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      const data = await res.json();

      if (!res.ok) {
        statusEl.innerHTML = `<span class="badge ng">エラー</span> ${data.error || "不明なエラー"}`;
      } else {
        const badge = data.automatable
          ? '<span class="badge ok">自動化OK</span>'
          : '<span class="badge ng">自動化NG</span>';
        statusEl.innerHTML = `${badge} フォーム発見: ${data.formFound ? "あり" : "なし"} / CAPTCHA: ${data.captchaDetected ? "検出" : "なし"}`;
      }
      resultEl.textContent = JSON.stringify(data, null, 2);
    } catch (err) {
      statusEl.innerHTML = `<span class="badge ng">エラー</span> ${err.message}`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="search"></i>解析する';
      lucide.createIcons();
    }
  });

  lucide.createIcons();
</script>
</body>
</html>
