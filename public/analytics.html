<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>分析 - LOCLE営業ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root { --main-green: #44B13F; --deep-green: #2F8A2A; --bg: #f7f9f7; }
  * { box-sizing: border-box; }
  body { font-family: "Noto Sans JP", sans-serif; background: var(--bg); margin: 0; color: #222; }

  .page-header { background: var(--deep-green); color: white; padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  .page-header h1 { margin: 0; font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .page-nav { display: flex; gap: 20px; margin-left: auto; flex-wrap: wrap; }
  .page-nav a { color: rgba(255,255,255,0.75); font-size: 13px; text-decoration: none; white-space: nowrap; }
  .page-nav a:hover { color: white; }
  .page-nav a.active { color: white; font-weight: 700; border-bottom: 2px solid rgba(255,255,255,0.8); padding-bottom: 2px; }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  .analytics-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .updated-at { font-size: 13px; color: #888; flex: 1; }
  .btn-refresh {
    padding: 7px 16px; font-size: 13px; border-radius: 6px;
    border: 1px solid var(--main-green); color: var(--deep-green);
    background: white; cursor: pointer; font-family: inherit; font-weight: 700;
  }
  .btn-refresh:hover { background: #f0faf0; }

  /* Summary cards */
  .summary-cards { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .summary-card {
    flex: 1; min-width: 140px; background: white; border-radius: 8px;
    padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); text-align: center;
  }
  .summary-card .card-label { font-size: 12px; color: #888; margin-bottom: 8px; }
  .summary-card .card-value { font-size: 28px; font-weight: 700; color: var(--deep-green); line-height: 1; }
  .summary-card .card-unit  { font-size: 14px; font-weight: 400; color: #888; margin-left: 2px; }

  /* Empty state */
  .empty-state {
    background: white; border-radius: 8px; padding: 48px 24px;
    text-align: center; color: #999; font-size: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 24px;
  }

  .stat-section {
    background: white; border-radius: 8px; padding: 20px 24px;
    margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .stat-section h2 { margin: 0 0 16px; font-size: 15px; color: var(--deep-green); }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
  th { background: #f8faf8; font-weight: 700; color: #555; font-size: 12px; white-space: nowrap; }
  th.r, td.r { text-align: right; }
  tr:hover td { background: #fafff9; }
  .rate-hi { color: var(--deep-green); font-weight: 700; }
  .rate-lo { color: #bbb; }
  .dash    { color: #ccc; }
  .empty   { font-size: 13px; color: #999; padding: 16px 0; margin: 0; }

  /* Progress bar */
  .rate-bar  { display: inline-block; vertical-align: middle; width: 80px; height: 8px; background: #e8f0e8; border-radius: 4px; margin-left: 8px; }
  .rate-fill { height: 100%; background: var(--main-green); border-radius: 4px; transition: width 0.3s; }
</style>
</head>
<body>

<header class="page-header">
  <h1>分析</h1>
  <nav class="page-nav">
    <a href="/index.html">フォーム解析</a>
    <a href="/companies.html">企業リスト</a>
    <a href="/variants.html">メッセージ管理</a>
    <a href="/send.html">送信管理</a>
    <a href="/analytics.html" class="active">分析</a>
  </nav>
</header>

<div class="container">

  <div class="analytics-header">
    <span class="updated-at" id="updatedAt">読み込み中...</span>
    <button class="btn-refresh" onclick="loadAnalytics()">更新</button>
  </div>

  <div class="summary-cards" id="summaryCards"></div>

  <div id="mainContent"></div>

</div>

<script>
  async function loadAnalytics() {
    document.getElementById("updatedAt").textContent = "読み込み中...";
    try {
      const res = await fetch("/api/analytics");
      if (!res.ok) throw new Error("取得失敗");
      const data = await res.json();

      const totalSends     = (data.variants_stats || []).reduce((s, r) => s + Number(r.send_count),     0);
      const totalResponses = (data.variants_stats || []).reduce((s, r) => s + Number(r.response_count), 0);
      const overallRate    = totalSends > 0 ? (totalResponses / totalSends * 100).toFixed(1) : 0;

      document.getElementById("summaryCards").innerHTML = renderSummaryCards(totalSends, totalResponses, overallRate);

      if (totalSends === 0) {
        document.getElementById("mainContent").innerHTML =
          '<div class="empty-state">まだ送信データがありません</div>';
      } else {
        document.getElementById("mainContent").innerHTML =
          `<section class="stat-section">
            <h2>バリアント別集計</h2>
            <div class="table-wrap">${renderVariantsTable(data.variants_stats)}</div>
          </section>
          <section class="stat-section">
            <h2>タグ別集計</h2>
            <div class="table-wrap">${renderTagsTable(data.tags_stats)}</div>
          </section>`;
      }

      document.getElementById("updatedAt").textContent =
        `最終更新: ${new Date().toLocaleString("ja-JP")}`;
    } catch (err) {
      document.getElementById("mainContent").innerHTML =
        `<div class="empty-state">エラー: ${esc(err.message)}</div>`;
      document.getElementById("updatedAt").textContent = "取得失敗";
    }
  }

  function renderSummaryCards(totalSends, totalResponses, overallRate) {
    return `
      <div class="summary-card">
        <div class="card-label">総送信数</div>
        <div class="card-value">${totalSends}<span class="card-unit">件</span></div>
      </div>
      <div class="summary-card">
        <div class="card-label">総反応数</div>
        <div class="card-value">${totalResponses}<span class="card-unit">件</span></div>
      </div>
      <div class="summary-card">
        <div class="card-label">全体反応率</div>
        <div class="card-value">${overallRate}<span class="card-unit">%</span></div>
      </div>`;
  }

  function renderVariantsTable(stats) {
    if (!stats || stats.length === 0) {
      return '<p class="empty">データがありません（送信を記録すると集計が表示されます）</p>';
    }
    const rows = stats.map(r => {
      const sends = Number(r.send_count);
      const rate  = Number(r.response_rate);
      const rc    = rate >= 20 ? "rate-hi" : (rate === 0 ? "rate-lo" : "");
      const dash  = sends === 0;
      return `
        <tr>
          <td>${esc(r.variant_name)}</td>
          <td class="r">${sends}</td>
          <td class="r">${dash ? '<span class="dash">—</span>' : r.response_count}</td>
          <td class="r">${dash ? '<span class="dash">—</span>' : r.interested_count}</td>
          <td class="r">
            ${dash
              ? '<span class="dash">—</span>'
              : `<span class="${rc}">${rate}%</span><span class="rate-bar"><span class="rate-fill" style="width:${Math.min(rate,100)}%"></span></span>`
            }
          </td>
        </tr>`;
    }).join("");
    return `
      <table>
        <thead>
          <tr>
            <th>バリアント名</th>
            <th class="r">送信数</th>
            <th class="r">反応数</th>
            <th class="r">興味あり</th>
            <th class="r">反応率</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function renderTagsTable(stats) {
    if (!stats || stats.length === 0) {
      return '<p class="empty">タグがまだ設定されていません</p>';
    }
    const rows = stats.map(r => {
      const sends = Number(r.send_count);
      const rate  = Number(r.response_rate);
      const rc    = rate >= 20 ? "rate-hi" : (rate === 0 ? "rate-lo" : "");
      const dash  = sends === 0;
      return `
        <tr>
          <td>${esc(r.tag_key)}</td>
          <td>${esc(r.tag_value)}</td>
          <td class="r">${sends}</td>
          <td class="r">${dash ? '<span class="dash">—</span>' : r.response_count}</td>
          <td class="r">
            ${dash
              ? '<span class="dash">—</span>'
              : `<span class="${rc}">${rate}%</span><span class="rate-bar"><span class="rate-fill" style="width:${Math.min(rate,100)}%"></span></span>`
            }
          </td>
        </tr>`;
    }).join("");
    return `
      <table>
        <thead>
          <tr>
            <th>タグキー</th>
            <th>タグ値</th>
            <th class="r">送信数</th>
            <th class="r">反応数</th>
            <th class="r">反応率</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function esc(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  loadAnalytics();
</script>
</body>
</html>
