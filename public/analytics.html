<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>分析 - LOCLE営業ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root { --main-green: #44B13F; --deep-green: #2F8A2A; --bg: #f7f9f7; }
  * { box-sizing: border-box; }
  body { font-family: "Noto Sans JP", sans-serif; background: var(--bg); margin: 0; color: #222; }

  .page-header { background: var(--deep-green); color: white; padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  .page-header h1 { margin: 0; font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .page-nav { display: flex; gap: 20px; margin-left: auto; flex-wrap: wrap; }
  .page-nav a { color: rgba(255,255,255,0.75); font-size: 13px; text-decoration: none; white-space: nowrap; }
  .page-nav a:hover { color: white; }
  .page-nav a.active { color: white; font-weight: 700; border-bottom: 2px solid rgba(255,255,255,0.8); padding-bottom: 2px; }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  .analytics-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .updated-at { font-size: 13px; color: #888; flex: 1; }
  .btn-refresh {
    padding: 7px 16px; font-size: 13px; border-radius: 6px;
    border: 1px solid var(--main-green); color: var(--deep-green);
    background: white; cursor: pointer; font-family: inherit; font-weight: 700;
  }
  .btn-refresh:hover { background: #f0faf0; }

  .stat-section {
    background: white; border-radius: 8px; padding: 20px 24px;
    margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .stat-section h2 { margin: 0 0 16px; font-size: 15px; color: var(--deep-green); }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
  th { background: #f8faf8; font-weight: 700; color: #555; font-size: 12px; white-space: nowrap; }
  th.r, td.r { text-align: right; }
  tr:hover td { background: #fafff9; }
  .rate-hi { color: var(--deep-green); font-weight: 700; }
  .rate-lo { color: #bbb; }
  .empty { font-size: 13px; color: #999; padding: 16px 0; margin: 0; }
</style>
</head>
<body>

<header class="page-header">
  <h1>分析</h1>
  <nav class="page-nav">
    <a href="/index.html">フォーム解析</a>
    <a href="/companies.html">企業リスト</a>
    <a href="/variants.html">メッセージ管理</a>
    <a href="/send.html">送信管理</a>
    <a href="/analytics.html" class="active">分析</a>
  </nav>
</header>

<div class="container">

  <div class="analytics-header">
    <span class="updated-at" id="updatedAt">読み込み中...</span>
    <button class="btn-refresh" onclick="loadAnalytics()">更新</button>
  </div>

  <section class="stat-section">
    <h2>バリアント別集計</h2>
    <div class="table-wrap" id="variantsTable"><p class="empty">読み込み中...</p></div>
  </section>

  <section class="stat-section">
    <h2>タグ別集計</h2>
    <div class="table-wrap" id="tagsTable"><p class="empty">読み込み中...</p></div>
  </section>

</div>

<script>
  async function loadAnalytics() {
    document.getElementById("updatedAt").textContent = "読み込み中...";
    try {
      const res = await fetch("/api/analytics");
      if (!res.ok) throw new Error("取得失敗");
      const data = await res.json();

      document.getElementById("variantsTable").innerHTML = renderVariantsTable(data.variants_stats);
      document.getElementById("tagsTable").innerHTML     = renderTagsTable(data.tags_stats);
      document.getElementById("updatedAt").textContent   =
        `最終更新: ${new Date().toLocaleString("ja-JP")}`;
    } catch (err) {
      document.getElementById("variantsTable").innerHTML =
        `<p class="empty">エラー: ${esc(err.message)}</p>`;
      document.getElementById("updatedAt").textContent = "取得失敗";
    }
  }

  function renderVariantsTable(stats) {
    if (!stats || stats.length === 0) {
      return '<p class="empty">データがありません（送信を記録すると集計が表示されます）</p>';
    }
    const rows = stats.map(r => {
      const rc = Number(r.response_rate) >= 20 ? "rate-hi" : (Number(r.response_rate) === 0 ? "rate-lo" : "");
      return `
        <tr>
          <td>${esc(r.variant_name)}</td>
          <td class="r">${r.send_count}</td>
          <td class="r">${r.response_count}</td>
          <td class="r">${r.interested_count}</td>
          <td class="r ${rc}">${r.response_rate}%</td>
        </tr>`;
    }).join("");
    return `
      <table>
        <thead>
          <tr>
            <th>バリアント名</th>
            <th class="r">送信数</th>
            <th class="r">反応数</th>
            <th class="r">興味あり</th>
            <th class="r">反応率</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function renderTagsTable(stats) {
    if (!stats || stats.length === 0) {
      return '<p class="empty">タグがまだ設定されていません</p>';
    }
    const rows = stats.map(r => {
      const rc = Number(r.response_rate) >= 20 ? "rate-hi" : (Number(r.response_rate) === 0 ? "rate-lo" : "");
      return `
        <tr>
          <td>${esc(r.tag_key)}</td>
          <td>${esc(r.tag_value)}</td>
          <td class="r">${r.send_count}</td>
          <td class="r">${r.response_count}</td>
          <td class="r ${rc}">${r.response_rate}%</td>
        </tr>`;
    }).join("");
    return `
      <table>
        <thead>
          <tr>
            <th>タグキー</th>
            <th>タグ値</th>
            <th class="r">送信数</th>
            <th class="r">反応数</th>
            <th class="r">反応率</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function esc(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  loadAnalytics();
</script>
</body>
</html>
