<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>分析 - LOCLE営業ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --green-500: #44B13F; --green-700: #2F8A2A;
    --green-50: #f0faf0;  --green-100: #d8f0d8;
    --gray-50: #f8fafc;   --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;  --gray-300: #cbd5e1;
    --gray-400: #94a3b8;  --gray-500: #64748b;
    --gray-700: #334155;  --gray-900: #0f172a;
    --white: #ffffff;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
    --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; }
  body { font-family: "Inter", "Noto Sans JP", sans-serif; background: var(--gray-50); margin: 0; color: var(--gray-900); }

  .page-header {
    background: var(--white); border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-sm); padding: 0 24px;
    display: flex; align-items: center; gap: 16px;
    height: 56px; position: sticky; top: 0; z-index: 100;
  }
  .page-header h1 { margin: 0; font-size: 15px; font-weight: 700; color: var(--green-700); flex-shrink: 0; }
  .page-nav { display: flex; gap: 2px; margin-left: auto; flex-wrap: wrap; }
  .page-nav a {
    color: var(--gray-500); font-size: 13px; font-weight: 500;
    text-decoration: none; white-space: nowrap;
    padding: 6px 10px; border-radius: var(--radius-sm); transition: all 150ms;
  }
  .page-nav a:hover { color: var(--gray-900); background: var(--gray-100); }
  .page-nav a.active { color: var(--green-700); font-weight: 600; background: var(--green-50); }

  .container { max-width: 960px; margin: 0 auto; padding: 28px 16px; }

  .analytics-header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .updated-at { font-size: 12px; color: var(--gray-400); flex: 1; }
  .btn-refresh, .btn-check {
    padding: 7px 14px; font-size: 13px; border-radius: var(--radius-sm);
    cursor: pointer; font-family: inherit; font-weight: 600;
    transition: all 150ms; white-space: nowrap;
  }
  .btn-refresh {
    border: 1px solid var(--gray-200); color: var(--gray-700); background: var(--white);
  }
  .btn-refresh:hover { background: var(--gray-50); }
  .btn-check {
    border: 1px solid #a5b4fc; color: #4338ca; background: var(--white);
  }
  .btn-check:hover:not(:disabled) { background: #eef2ff; }
  .btn-check:disabled { border-color: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
  .check-msg { font-size: 12px; color: var(--gray-500); }

  /* Summary cards */
  .summary-cards { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .summary-card {
    flex: 1; min-width: 140px; background: var(--white);
    border: 1px solid var(--gray-200); border-radius: var(--radius-lg);
    padding: 20px 24px; box-shadow: var(--shadow-sm); text-align: center;
  }
  .summary-card .card-label {
    font-size: 11px; color: var(--gray-400); margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
  }
  .summary-card .card-value {
    font-size: 32px; font-weight: 700; color: var(--green-700);
    line-height: 1; letter-spacing: -0.03em;
  }
  .summary-card .card-unit { font-size: 14px; font-weight: 400; color: var(--gray-400); margin-left: 3px; }

  /* Empty state */
  .empty-state {
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg); padding: 56px 24px;
    text-align: center; color: var(--gray-400); font-size: 14px;
    box-shadow: var(--shadow-sm); margin-bottom: 24px;
  }

  .stat-section {
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg); padding: 24px;
    margin-bottom: 20px; box-shadow: var(--shadow-sm);
  }
  .stat-section h2 {
    margin: 0 0 18px; font-size: 14px; font-weight: 600;
    color: var(--gray-700); letter-spacing: -0.01em;
  }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--gray-50); text-align: left; padding: 10px 14px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--gray-500);
    border-bottom: 2px solid var(--gray-200); white-space: nowrap;
  }
  td { padding: 12px 14px; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); }
  th.r, td.r { text-align: right; }
  tr:hover td { background: var(--gray-50); }
  .rate-hi { color: var(--green-700); font-weight: 600; }
  .rate-lo { color: var(--gray-300); }
  .dash    { color: var(--gray-300); }
  .empty   { font-size: 13px; color: var(--gray-400); padding: 16px 0; margin: 0; }

  /* Progress bar */
  .rate-bar  { display: inline-block; vertical-align: middle; width: 72px; height: 6px; background: var(--gray-200); border-radius: 999px; margin-left: 8px; }
  .rate-fill { height: 100%; background: var(--green-500); border-radius: 999px; transition: width 0.3s; }

  @media (max-width: 600px) {
    .page-header { padding: 0 12px; }
    .page-nav { overflow-x: auto; padding-bottom: 2px; }
    .container { padding: 16px 8px; }
    .summary-cards { flex-direction: column; }
    .summary-card { min-width: unset; }
    .btn-refresh, .btn-check { min-height: 44px; }
    .rate-bar { width: 48px; }
  }
</style>
</head>
<body>

<header class="page-header">
  <h1>LOCLE 営業ツール</h1>
  <nav class="page-nav">
    <a href="/index.html">フォーム解析</a>
    <a href="/companies.html">企業リスト</a>
    <a href="/variants.html">メッセージ管理</a>
    <a href="/send.html">送信管理</a>
    <a href="/analytics.html" class="active">分析</a>
  </nav>
</header>

<div class="container">

  <div class="analytics-header">
    <span class="updated-at" id="updatedAt">読み込み中...</span>
    <span class="check-msg" id="checkMsg"></span>
    <button class="btn-check" id="checkBtn" onclick="checkReplies()">返信チェック</button>
    <button class="btn-refresh" onclick="loadAnalytics()">更新</button>
  </div>

  <div class="summary-cards" id="summaryCards"></div>

  <div id="mainContent"></div>

</div>

<script>
  async function loadAnalytics() {
    document.getElementById("updatedAt").textContent = "読み込み中...";
    try {
      const res = await fetch("/api/analytics");
      if (!res.ok) throw new Error("取得失敗");
      const data = await res.json();

      const totalSends     = (data.variants_stats || []).reduce((s, r) => s + Number(r.send_count),     0);
      const totalResponses = (data.variants_stats || []).reduce((s, r) => s + Number(r.response_count), 0);
      const overallRate    = totalSends > 0 ? (totalResponses / totalSends * 100).toFixed(1) : 0;

      document.getElementById("summaryCards").innerHTML = renderSummaryCards(totalSends, totalResponses, overallRate);

      if (totalSends === 0) {
        document.getElementById("mainContent").innerHTML =
          '<div class="empty-state">まだ送信データがありません</div>';
      } else {
        document.getElementById("mainContent").innerHTML =
          `<section class="stat-section">
            <h2>バリアント別集計</h2>
            <div class="table-wrap">${renderVariantsTable(data.variants_stats)}</div>
          </section>
          <section class="stat-section">
            <h2>タグ別集計</h2>
            <div class="table-wrap">${renderTagsTable(data.tags_stats)}</div>
          </section>`;
      }

      document.getElementById("updatedAt").textContent =
        `最終更新: ${new Date().toLocaleString("ja-JP")}`;
    } catch (err) {
      document.getElementById("mainContent").innerHTML =
        `<div class="empty-state">エラー: ${esc(err.message)}</div>`;
      document.getElementById("updatedAt").textContent = "取得失敗";
    }
  }

  function renderSummaryCards(totalSends, totalResponses, overallRate) {
    return `
      <div class="summary-card">
        <div class="card-label">総送信数</div>
        <div class="card-value">${totalSends}<span class="card-unit">件</span></div>
      </div>
      <div class="summary-card">
        <div class="card-label">総反応数</div>
        <div class="card-value">${totalResponses}<span class="card-unit">件</span></div>
      </div>
      <div class="summary-card">
        <div class="card-label">全体反応率</div>
        <div class="card-value">${overallRate}<span class="card-unit">%</span></div>
      </div>`;
  }

  function renderVariantsTable(stats) {
    if (!stats || stats.length === 0) {
      return '<p class="empty">データがありません（送信を記録すると集計が表示されます）</p>';
    }
    const rows = stats.map(r => {
      const sends = Number(r.send_count);
      const rate  = Number(r.response_rate);
      const rc    = rate >= 20 ? "rate-hi" : (rate === 0 ? "rate-lo" : "");
      const dash  = sends === 0;
      return `
        <tr>
          <td>${esc(r.variant_name)}</td>
          <td class="r">${sends}</td>
          <td class="r">${dash ? '<span class="dash">—</span>' : r.response_count}</td>
          <td class="r">${dash ? '<span class="dash">—</span>' : r.interested_count}</td>
          <td class="r">
            ${dash
              ? '<span class="dash">—</span>'
              : `<span class="${rc}">${rate}%</span><span class="rate-bar"><span class="rate-fill" style="width:${Math.min(rate,100)}%"></span></span>`
            }
          </td>
        </tr>`;
    }).join("");
    return `
      <table>
        <thead>
          <tr>
            <th>バリアント名</th>
            <th class="r">送信数</th>
            <th class="r">反応数</th>
            <th class="r">興味あり</th>
            <th class="r">反応率</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function renderTagsTable(stats) {
    if (!stats || stats.length === 0) {
      return '<p class="empty">タグがまだ設定されていません</p>';
    }
    const rows = stats.map(r => {
      const sends = Number(r.send_count);
      const rate  = Number(r.response_rate);
      const rc    = rate >= 20 ? "rate-hi" : (rate === 0 ? "rate-lo" : "");
      const dash  = sends === 0;
      return `
        <tr>
          <td>${esc(r.tag_key)}</td>
          <td>${esc(r.tag_value)}</td>
          <td class="r">${sends}</td>
          <td class="r">${dash ? '<span class="dash">—</span>' : r.response_count}</td>
          <td class="r">
            ${dash
              ? '<span class="dash">—</span>'
              : `<span class="${rc}">${rate}%</span><span class="rate-bar"><span class="rate-fill" style="width:${Math.min(rate,100)}%"></span></span>`
            }
          </td>
        </tr>`;
    }).join("");
    return `
      <table>
        <thead>
          <tr>
            <th>タグキー</th>
            <th>タグ値</th>
            <th class="r">送信数</th>
            <th class="r">反応数</th>
            <th class="r">反応率</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function esc(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function checkReplies() {
    const btn   = document.getElementById("checkBtn");
    const msgEl = document.getElementById("checkMsg");
    btn.disabled = true;
    msgEl.textContent = "チェック中...";
    try {
      const res  = await fetch("/api/analytics?action=check-replies");
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "失敗");
      msgEl.textContent =
        `${data.checked}件チェック、${data.matched}件一致、${data.recorded}件記録しました`;
      if (data.recorded > 0) loadAnalytics();
    } catch (err) {
      msgEl.textContent = `エラー: ${esc(err.message)}`;
    } finally {
      btn.disabled = false;
    }
  }

  loadAnalytics();
</script>
</body>
</html>
