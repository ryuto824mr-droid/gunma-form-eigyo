<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>企業リスト - LOCLE営業ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --green-500: #44B13F; --green-700: #2F8A2A;
    --green-50: #f0faf0;  --green-100: #d8f0d8;
    --gray-50: #f8fafc;   --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;  --gray-300: #cbd5e1;
    --gray-400: #94a3b8;  --gray-500: #64748b;
    --gray-700: #334155;  --gray-900: #0f172a;
    --white: #ffffff;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
    --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; }
  body { font-family: "Inter","Noto Sans JP",sans-serif; background: var(--gray-50); margin: 0; color: var(--gray-900); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .container { animation: fadeInUp 0.4s ease-out; }
  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid var(--gray-200); border-top-color: var(--green-500);
    border-radius: 50%; animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 4px;
  }

  .page-header {
    background: linear-gradient(135deg, #2F8A2A 0%, #44B13F 50%, #5BC952 100%);
    border-bottom: none; box-shadow: 0 2px 8px rgba(47,138,42,0.3);
    padding: 0 24px; display: flex; align-items: center; gap: 16px;
    height: 56px; position: sticky; top: 0; z-index: 100;
  }
  .page-header h1 {
    margin: 0; font-size: 15px; font-weight: 700; color: var(--white);
    flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  }
  .page-header h1 svg { width: 18px; height: 18px; }
  .page-nav { display: flex; gap: 2px; margin-left: auto; flex-wrap: wrap; }
  .page-nav a {
    color: rgba(255,255,255,0.75); font-size: 13px; font-weight: 500;
    text-decoration: none; white-space: nowrap;
    padding: 6px 10px; border-radius: var(--radius-sm); transition: all 150ms;
  }
  .page-nav a:hover { color: white; background: rgba(255,255,255,0.15); }
  .page-nav a.active {
    color: white; font-weight: 600;
    background: rgba(255,255,255,0.15); border-bottom: 2px solid white; padding-bottom: 4px;
  }

  .container { max-width: 1080px; margin: 0 auto; padding: 24px 16px; }

  /* Summary bar */
  .summary-bar {
    display: flex; gap: 24px; padding: 14px 20px; margin-bottom: 20px;
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
    font-size: 13px; color: var(--gray-500); flex-wrap: wrap;
    position: relative; overflow: hidden;
  }
  .summary-bar::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #44B13F, #5BC952);
  }
  .summary-item { display: flex; flex-direction: column; gap: 2px; }
  .summary-item strong { color: var(--green-700); font-size: 18px; font-weight: 700; display: block; }
  .summary-item span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; color: var(--gray-400); }

  /* Sections */
  .add-section, .import-section, .discover-section {
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg); padding: 20px 24px;
    margin-bottom: 20px; box-shadow: var(--shadow-sm);
  }
  .add-section h2, .import-section h2, .discover-section h2 {
    margin: 0 0 14px; font-size: 14px; font-weight: 600; color: var(--gray-700);
  }

  /* Inputs */
  input[type="text"], input[type="url"], input[type="email"] {
    padding: 8px 12px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
    background: var(--white); color: var(--gray-900); transition: border-color 150ms;
  }
  input[type="text"]:focus, input[type="url"]:focus, input[type="email"]:focus {
    outline: none; border-color: var(--green-500); box-shadow: 0 0 0 3px var(--green-100);
  }

  .add-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .add-row input[name="name"]  { flex: 0 0 200px; }
  .add-row input[name="url"]   { flex: 1 1 220px; }
  .add-row input[name="email"] { flex: 1 1 180px; }

  .btn-primary {
    padding: 8px 16px;
    background: linear-gradient(135deg, #44B13F, #2F8A2A);
    box-shadow: 0 4px 12px rgba(68,177,63,0.3);
    color: var(--white); border: none; border-radius: var(--radius-sm);
    cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit;
    transition: all 150ms ease; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary:hover:not(:disabled) {
    background: linear-gradient(135deg, #3da038, #277025);
    transform: translateY(-1px); box-shadow: 0 6px 16px rgba(68,177,63,0.4);
  }
  .btn-primary:disabled { background: var(--gray-300); box-shadow: none; cursor: not-allowed; transform: none; }
  .btn-primary svg { width: 13px; height: 13px; }

  .add-msg { margin-top: 8px; font-size: 13px; min-height: 18px; }
  .add-msg.error { color: #dc2626; }
  .add-msg.ok    { color: var(--green-700); }

  .import-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .import-format { font-size: 11px; color: var(--gray-400); margin: 8px 0 0; }
  .import-msg { margin-top: 8px; font-size: 13px; min-height: 18px; }
  .import-msg.ok    { color: var(--green-700); }
  .import-msg.error { color: #dc2626; }

  /* Table section */
  .table-section {
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden;
  }
  .bulk-toolbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 14px 20px; border-bottom: 1px solid var(--gray-200);
  }
  .bulk-toolbar h2 { margin: 0; font-size: 14px; font-weight: 600; color: var(--gray-700); flex: 1; }
  .btn-bulk {
    padding: 7px 14px; font-size: 13px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, #44B13F, #2F8A2A);
    box-shadow: 0 4px 12px rgba(68,177,63,0.3);
    color: var(--white); border: none; cursor: pointer;
    font-family: inherit; font-weight: 600; white-space: nowrap;
    transition: all 150ms ease;
  }
  .btn-bulk:hover:not(:disabled) {
    background: linear-gradient(135deg, #3da038, #277025);
    transform: translateY(-1px); box-shadow: 0 6px 16px rgba(68,177,63,0.4);
  }
  .btn-bulk:disabled { background: var(--gray-300); box-shadow: none; cursor: not-allowed; transform: none; }
  .bulk-progress { font-size: 12px; color: var(--gray-500); }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--gray-50); text-align: left; padding: 10px 14px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--gray-500);
    border-bottom: 2px solid var(--gray-200); white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--gray-100); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover td { background: var(--green-50); transition: background 100ms ease; }
  td { padding: 10px 14px; vertical-align: middle; color: var(--gray-700); }
  td.url a { color: #2563eb; word-break: break-all; font-size: 12px; }
  td.name { font-weight: 500; color: var(--gray-900); }
  .empty-row td { text-align: center; color: var(--gray-400); padding: 32px; }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-pending    { background: var(--gray-100); color: var(--gray-500); }
  .badge-researching{ background: #ede9fe; color: #6d28d9; }
  .badge-researched { background: var(--green-50); color: var(--green-700); }
  .badge-no_form    { background: #fff7ed; color: #c2410c; }
  .badge-captcha    { background: #fffbeb; color: #b45309; }
  .badge-error      { background: #fff5f5; color: #dc2626; }
  .badge-ok         { background: var(--green-50); color: var(--green-700); }
  .badge-ng         { background: #fff5f5; color: #dc2626; }

  /* Action buttons */
  .btn-research {
    padding: 5px 10px; font-size: 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--green-500); color: var(--green-700);
    background: var(--white); cursor: pointer; font-family: inherit;
    transition: all 150ms ease;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .btn-research:hover:not(:disabled) { background: var(--green-500); color: var(--white); transform: translateY(-1px); }
  .btn-research:disabled { border-color: var(--gray-200); color: var(--gray-400); cursor: not-allowed; transform: none; }
  .btn-research svg { width: 12px; height: 12px; }

  .btn-detail {
    margin-left: 6px; padding: 5px 10px; font-size: 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--gray-200); color: var(--gray-500); background: var(--white);
    cursor: pointer; font-family: inherit; transition: all 150ms ease;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .btn-detail:hover { background: var(--gray-50); color: var(--gray-900); transform: translateY(-1px); }
  .btn-detail svg { width: 12px; height: 12px; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 1000;
    align-items: center; justify-content: center; padding: 16px;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--white); border-radius: var(--radius-lg); max-width: 760px; width: 100%;
    max-height: 85vh; display: flex; flex-direction: column;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--gray-200);
  }
  .modal-header h3 { margin: 0; font-size: 15px; font-weight: 600; color: var(--gray-900); }
  .modal-close {
    background: none; border: none; font-size: 18px; cursor: pointer;
    color: var(--gray-400); line-height: 1; padding: 4px 8px; border-radius: var(--radius-sm);
    transition: all 150ms;
  }
  .modal-close:hover { color: var(--gray-700); background: var(--gray-100); }
  .modal-body { padding: 20px; overflow-y: auto; flex: 1; }

  .info-grid { display: grid; grid-template-columns: auto 1fr; gap: 6px 16px; font-size: 13px; margin-bottom: 20px; }
  .info-grid dt { font-weight: 600; color: var(--gray-500); white-space: nowrap; }
  .info-grid dd { margin: 0; color: var(--gray-700); }
  .info-grid dd a { color: #2563eb; word-break: break-all; }

  .fields-title { font-size: 13px; font-weight: 600; color: var(--gray-700); margin: 0 0 10px; }
  .fields-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .fields-table th {
    background: var(--gray-50); padding: 7px 10px; text-align: left;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--gray-500); border-bottom: 2px solid var(--gray-200);
  }
  .fields-table td { padding: 6px 10px; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); }
  .fields-table tr:last-child td { border-bottom: none; }
  .conf-high   { color: var(--green-700); font-weight: 600; }
  .conf-medium { color: #c2410c; }
  .conf-low    { color: var(--gray-400); }

  .source-label {
    display: inline-block; margin-left: 8px; padding: 1px 7px;
    border-radius: 4px; font-size: 11px; color: white; vertical-align: middle;
  }
  .source-ai        { background: #6366f1; }
  .source-heuristic { background: var(--gray-500); }

  .discover-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .discover-row input { flex: 1 1 160px; }
  .badge-places { flex-shrink: 0; display: inline-block; padding: 1px 6px; background: #4285f4; color: white; font-size: 10px; border-radius: 3px; white-space: nowrap; }
  .discover-unconfigured { margin-top: 14px; padding: 12px 16px; background: var(--gray-50); border-left: 3px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 13px; color: var(--gray-500); }
  .discover-status { margin-top: 12px; font-size: 13px; color: var(--gray-400); }
  .discover-error  { margin-top: 12px; font-size: 13px; color: #dc2626; }
  .discover-count  { margin: 12px 0 8px; font-size: 13px; color: var(--gray-700); font-weight: 500; }
  .discover-list { list-style: none; margin: 0 0 14px; padding: 0; border: 1px solid var(--gray-200); border-radius: var(--radius-md); overflow: hidden; }
  .discover-list li { border-bottom: 1px solid var(--gray-100); }
  .discover-list li:last-child { border-bottom: none; }
  .discover-list label { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer; font-size: 13px; transition: background 150ms; }
  .discover-list label:hover { background: var(--gray-50); }
  .discover-list input[type="checkbox"] { flex-shrink: 0; width: 15px; height: 15px; cursor: pointer; }
  .discover-name { font-weight: 500; flex-shrink: 0; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--gray-900); }
  .discover-url  { color: #2563eb; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; text-decoration: none; }
  .discover-url:hover { text-decoration: underline; }
  .btn-add-selected {
    padding: 8px 16px; font-size: 13px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, #44B13F, #2F8A2A);
    box-shadow: 0 4px 12px rgba(68,177,63,0.3);
    color: var(--white); border: none; cursor: pointer;
    font-family: inherit; font-weight: 600; transition: all 150ms ease;
  }
  .btn-add-selected:hover:not(:disabled) { background: linear-gradient(135deg, #3da038, #277025); transform: translateY(-1px); }
  .btn-add-selected:disabled { background: var(--gray-300); box-shadow: none; cursor: not-allowed; transform: none; }
  .add-selected-progress { margin-left: 12px; font-size: 13px; color: var(--gray-500); }

  /* Tooltip */
  .tooltip-wrap { position: relative; display: inline-block; }
  .tooltip-wrap .tooltip-text {
    visibility: hidden; opacity: 0;
    background: var(--gray-900); color: white;
    font-size: 11px; padding: 4px 8px; border-radius: 4px;
    position: absolute; bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%); white-space: nowrap;
    transition: opacity 150ms; z-index: 100; pointer-events: none;
  }
  .tooltip-wrap:hover .tooltip-text { visibility: visible; opacity: 1; }

  @media (max-width: 600px) {
    .page-header { padding: 0 12px; }
    .page-nav { overflow-x: auto; padding-bottom: 2px; }
    .container { padding: 16px 8px; }
    .add-row { flex-direction: column; }
    .add-row input[name="name"],
    .add-row input[name="url"],
    .add-row input[name="email"] { flex: none; width: 100%; font-size: 16px; }
    .add-row .btn-primary { min-height: 44px; width: 100%; justify-content: center; }
    .discover-row { flex-direction: column; }
    .discover-row input { width: 100%; font-size: 16px; }
    .discover-row .btn-primary { min-height: 44px; width: 100%; justify-content: center; }
    .import-row { flex-direction: column; }
    .import-row .btn-primary { min-height: 44px; width: 100%; justify-content: center; }
    table th:nth-child(2), table td:nth-child(2),
    table th:nth-child(3), table td:nth-child(3),
    table th:nth-child(5), table td:nth-child(5),
    table th:nth-child(6), table td:nth-child(6) { display: none; }
    .btn-bulk { min-height: 44px; width: 100%; }
    .btn-research { display: flex; width: 100%; margin-bottom: 4px; min-height: 44px; justify-content: center; }
    .btn-detail   { display: flex; width: 100%; margin-left: 0; min-height: 44px; justify-content: center; }
  }
</style>
</head>
<body>

<header class="page-header">
  <h1><a href="/index.html" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
    <img src="/logo.jpg" alt="LOCLE" style="height:28px; width:auto; object-fit:contain; background:white; padding:3px 8px; border-radius:6px;">
  </a></h1>
  <nav class="page-nav">
    <a href="/index.html">ホーム</a>
    <a href="/companies.html" class="active">企業リスト</a>
    <a href="/variants.html">メッセージ管理</a>
    <a href="/send.html">送信管理</a>
    <a href="/analytics.html">分析</a>
    <a href="/help.html">ヘルプ</a>
  </nav>
</header>

<div class="container">

  <div class="summary-bar" id="summaryBar" hidden></div>

  <section class="discover-section">
    <h2>企業を自動検索</h2>
    <div class="discover-row">
      <input type="text" id="discoverRegion"  placeholder="例: 群馬県" />
      <input type="text" id="discoverKeyword" placeholder="例: IT企業、Web制作" />
      <button class="btn-primary" id="discoverBtn" onclick="discoverCompanies()">
        <i data-lucide="search"></i>検索
      </button>
    </div>
    <div id="discoverResult"></div>
  </section>

  <section class="add-section">
    <h2>企業を追加</h2>
    <div class="add-row">
      <input type="text" name="name" id="inputName" placeholder="企業名" />
      <input type="url"   name="url"   id="inputUrl"   placeholder="https://example.co.jp" />
      <input type="email" name="email" id="inputEmail" placeholder="メールアドレス（任意）" />
      <button class="btn-primary" id="addBtn" onclick="addCompany()">
        <i data-lucide="plus"></i>追加
      </button>
    </div>
    <div class="add-msg" id="addMsg"></div>
  </section>

  <section class="import-section">
    <h2>CSVで一括インポート</h2>
    <div class="import-row">
      <input type="file" id="csvFile" accept=".csv" />
      <button class="btn-primary" id="importBtn" onclick="importCSV()">
        <i data-lucide="upload"></i>インポート
      </button>
    </div>
    <p class="import-format">形式: 1行目ヘッダー（name,url,email）、email列は任意。既存URLと重複する行はスキップ。</p>
    <div class="import-msg" id="importMsg"></div>
  </section>

  <section class="table-section">
    <div class="bulk-toolbar">
      <h2>登録企業一覧</h2>
      <span class="tooltip-wrap">
        <button class="btn-bulk" id="bulkBtn" onclick="bulkResearch()">未リサーチを一括リサーチ</button>
        <span class="tooltip-text">未リサーチの企業を順番に自動解析します</span>
      </span>
      <span class="bulk-progress" id="bulkProgress"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>企業名</th><th>URL</th><th>メール</th>
            <th>ステータス</th><th>自動化</th><th>更新日時</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="empty-row"><td colspan="7">読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </section>

</div>

<!-- モーダル -->
<div class="modal-overlay" id="modal" onclick="closeModalOnOverlay(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">リサーチ結果</h3>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  let companies = [];
  let isBulkResearching = false;

  loadCompanies();

  async function loadCompanies() {
    try {
      const res = await fetch("/api/companies");
      companies = await res.json();
      renderTable();
      updateSummaryBar();
    } catch (err) {
      document.getElementById("tableBody").innerHTML =
        `<tr class="empty-row"><td colspan="7">読み込みエラー: ${esc(err.message)}</td></tr>`;
    }
  }

  function updateSummaryBar() {
    const el = document.getElementById("summaryBar");
    if (!el) return;
    const total = companies.length;
    const automatable = companies.filter(c => c.research_result?.automatable === true).length;
    if (total === 0) { el.hidden = true; return; }
    el.hidden = false;
    el.innerHTML = `
      <div class="summary-item"><strong>${total}</strong><span>登録企業数</span></div>
      <div class="summary-item"><strong>${automatable}</strong><span>自動化可能</span></div>
      <div class="summary-item"><strong>${companies.filter(c => c.status === "pending").length}</strong><span>未リサーチ</span></div>`;
  }

  function renderTable() {
    const tbody = document.getElementById("tableBody");
    if (!companies.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">企業が登録されていません</td></tr>';
      updateSummaryBar();
      return;
    }
    tbody.innerHTML = companies.map(c => {
      const result = c.research_result;
      const updatedAt = c.updated_at
        ? new Date(c.updated_at).toLocaleString("ja-JP", { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" })
        : "—";
      const isResearching = c.status === "researching";
      const btnDisabled = isBulkResearching || isResearching;
      const researchLabel = isResearching
        ? '<span class="spinner"></span>リサーチ中...'
        : '<i data-lucide="search"></i>リサーチする';
      const detailBtn = result && !result.error && !isResearching
        ? `<button class="btn-detail" onclick="showDetail(${c.id})"><i data-lucide="eye"></i> 詳細</button>`
        : "";
      return `
        <tr id="row-${c.id}">
          <td class="name">${esc(c.name)}</td>
          <td class="url"><a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.url)}</a></td>
          <td style="font-size:12px">${c.email ? `<a href="mailto:${esc(c.email)}" style="color:#2563eb">${esc(c.email)}</a>` : '<span style="color:var(--gray-300)">—</span>'}</td>
          <td>${statusBadge(c.status)}</td>
          <td>${automatableBadge(result)}</td>
          <td style="white-space:nowrap;font-size:12px;color:var(--gray-400)">${updatedAt}</td>
          <td style="white-space:nowrap">
            <span class="tooltip-wrap"><button class="btn-research" id="rbtn-${c.id}" onclick="research(${c.id})" ${btnDisabled ? "disabled" : ""}>${researchLabel}</button><span class="tooltip-text">企業サイトのフォームを自動解析します</span></span>
            ${detailBtn}
          </td>
        </tr>`;
    }).join("");
    updateSummaryBar();
    lucide.createIcons();
  }

  async function callResearchAPI(id) {
    const res = await fetch(`/api/companies/${id}/research`, { method: "POST" });
    const data = await res.json();
    return { ok: res.ok, data };
  }

  function updateCompany(updated) {
    const idx = companies.findIndex(c => c.id === updated.id);
    if (idx !== -1) companies[idx] = updated;
    renderTable();
  }

  async function addCompany() {
    const name  = document.getElementById("inputName").value.trim();
    const url   = document.getElementById("inputUrl").value.trim();
    const email = document.getElementById("inputEmail").value.trim();
    const btn   = document.getElementById("addBtn");

    if (!name) { showMsg("企業名を入力してください", "error"); return; }
    if (!url)  { showMsg("URLを入力してください", "error"); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>登録中...';
    showMsg("登録中...", "");

    let newCompany;
    try {
      const res = await fetch("/api/companies", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, url, email: email || null }),
      });
      const data = await res.json();
      if (!res.ok) { showMsg(data.error || "登録エラー", "error"); btn.disabled = false; btn.innerHTML = '<i data-lucide="plus"></i>追加'; lucide.createIcons(); return; }
      newCompany = data;
      document.getElementById("inputName").value  = "";
      document.getElementById("inputUrl").value   = "";
      document.getElementById("inputEmail").value = "";
    } catch (err) {
      showMsg(err.message, "error");
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="plus"></i>追加';
      lucide.createIcons();
      return;
    }

    companies.unshift({ ...newCompany, status: "researching" });
    renderTable();
    showMsg("登録しました。リサーチ中...", "");

    try {
      const { ok, data: updated } = await callResearchAPI(newCompany.id);
      updateCompany(updated);
      showMsg(
        ok ? "登録・リサーチ完了" : `リサーチエラー: ${updated.research_result?.error || updated.error || "不明"}`,
        ok ? "ok" : "error"
      );
    } catch (err) {
      const idx = companies.findIndex(c => c.id === newCompany.id);
      if (idx !== -1) companies[idx] = { ...newCompany, status: "error", research_result: { error: err.message } };
      renderTable();
      showMsg("リサーチ中にエラーが発生しました", "error");
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="plus"></i>追加';
      lucide.createIcons();
    }
  }

  async function importCSV() {
    const fileInput = document.getElementById("csvFile");
    const btn       = document.getElementById("importBtn");
    const msgEl     = document.getElementById("importMsg");

    if (!fileInput.files || !fileInput.files[0]) {
      msgEl.textContent = "CSVファイルを選択してください";
      msgEl.className = "import-msg error";
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>インポート中...';
    msgEl.textContent = "インポート中...";
    msgEl.className = "import-msg";

    try {
      const csvText = await fileInput.files[0].text();
      const res = await fetch("/api/companies", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ csv: csvText }),
      });
      const data = await res.json();
      if (!res.ok) {
        msgEl.textContent = data.error || "インポートエラー";
        msgEl.className = "import-msg error";
        return;
      }
      msgEl.textContent = `インポート完了: ${data.imported}件追加、${data.skipped}件スキップ`;
      msgEl.className = "import-msg ok";
      fileInput.value = "";
      const listRes = await fetch("/api/companies");
      companies = await listRes.json();
      renderTable();
    } catch (err) {
      msgEl.textContent = err.message;
      msgEl.className = "import-msg error";
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="upload"></i>インポート';
      lucide.createIcons();
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById("addMsg");
    el.textContent = text;
    el.className = "add-msg" + (type ? " " + type : "");
  }

  async function bulkResearch() {
    if (isBulkResearching) return;
    const pending = companies.filter(c => c.status === "pending");
    if (pending.length === 0) {
      document.getElementById("bulkProgress").textContent = "未リサーチの企業はありません";
      return;
    }
    isBulkResearching = true;
    document.getElementById("bulkBtn").disabled = true;
    renderTable();
    let success = 0, failure = 0;
    const total = pending.length;
    for (let i = 0; i < pending.length; i++) {
      const company = pending[i];
      document.getElementById("bulkProgress").textContent = `${i+1}/${total}件 処理中...(${company.name})`;
      const idx = companies.findIndex(c => c.id === company.id);
      if (idx !== -1) companies[idx] = { ...companies[idx], status: "researching" };
      renderTable();
      try {
        const { ok, data: updated } = await callResearchAPI(company.id);
        updateCompany(updated);
        if (ok && updated.status !== "error") success++; else failure++;
      } catch (err) {
        const idx2 = companies.findIndex(c => c.id === company.id);
        if (idx2 !== -1) companies[idx2] = { ...companies[idx2], status: "error", research_result: { error: err.message } };
        renderTable(); failure++;
      }
    }
    isBulkResearching = false;
    document.getElementById("bulkBtn").disabled = false;
    document.getElementById("bulkProgress").textContent = `完了（成功: ${success}件 / 失敗: ${failure}件）`;
    renderTable();
  }

  async function research(id) {
    if (isBulkResearching) return;
    const idx = companies.findIndex(c => c.id === id);
    if (idx !== -1) companies[idx] = { ...companies[idx], status: "researching" };
    renderTable();
    try {
      const { ok, data: updated } = await callResearchAPI(id);
      if (!ok) alert("エラー: " + (updated.error || "不明なエラー"));
      updateCompany(updated);
    } catch (err) {
      alert("エラー: " + err.message);
      const idx2 = companies.findIndex(c => c.id === id);
      if (idx2 !== -1) companies[idx2] = { ...companies[idx2], status: "error" };
      renderTable();
    }
  }

  async function discoverCompanies() {
    const region   = document.getElementById("discoverRegion").value.trim();
    const keyword  = document.getElementById("discoverKeyword").value.trim();
    const btn      = document.getElementById("discoverBtn");
    const resultEl = document.getElementById("discoverResult");
    if (!region && !keyword) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>検索中...';
    resultEl.innerHTML = '<p class="discover-status">検索中...</p>';
    try {
      const res = await fetch("/api/discover", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ region, keyword }),
      });
      const data = await res.json();
      if (!res.ok) { resultEl.innerHTML = `<p class="discover-error">エラー: ${esc(data.error || "不明なエラー")}</p>`; return; }
      if (!data.configured) { resultEl.innerHTML = `<p class="discover-unconfigured">Brave Search APIキーの設定が必要です。</p>`; return; }
      if (!data.results || data.results.length === 0) { resultEl.innerHTML = `<p class="discover-status">検索結果が見つかりませんでした。</p>`; return; }
      resultEl.innerHTML = `
        <p class="discover-count">${data.results.length}件見つかりました</p>
        <ul class="discover-list">
          ${data.results.map((r, i) => `
            <li><label>
              <input type="checkbox" class="discover-check" data-name="${esc(r.name)}" data-url="${esc(r.url)}" checked />
              <span class="discover-name">${esc(r.name)}</span>
              ${r.source === "places" ? '<span class="badge-places">Googleマップ</span>' : ""}
              <a href="${esc(r.url)}" target="_blank" rel="noopener" class="discover-url">${esc(r.url)}</a>
            </label></li>`).join("")}
        </ul>
        <button class="btn-add-selected" id="addSelectedBtn" onclick="addSelectedCompanies()">選んだ企業を追加</button>
        <span class="add-selected-progress" id="addSelectedProgress"></span>`;
    } catch (err) {
      resultEl.innerHTML = `<p class="discover-error">エラー: ${esc(err.message)}</p>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="search"></i>検索';
      lucide.createIcons();
    }
  }

  async function addSelectedCompanies() {
    const checks = Array.from(document.querySelectorAll(".discover-check:checked"));
    if (checks.length === 0) return;
    const btn = document.getElementById("addSelectedBtn");
    const progress = document.getElementById("addSelectedProgress");
    btn.disabled = true;
    const total = checks.length;
    let added = 0;
    for (let i = 0; i < checks.length; i++) {
      const check = checks[i];
      const name = check.dataset.name;
      const url  = check.dataset.url;
      progress.textContent = `${i+1}/${total}件 登録中...(${name})`;
      let newCompany;
      try {
        const res = await fetch("/api/companies", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, url }),
        });
        const data = await res.json();
        if (!res.ok) continue;
        newCompany = data;
        companies.unshift({ ...newCompany, status: "researching" });
        renderTable();
      } catch { continue; }
      progress.textContent = `${i+1}/${total}件 リサーチ中...(${name})`;
      try {
        const { data: updated } = await callResearchAPI(newCompany.id);
        updateCompany(updated);
      } catch (err) {
        const idx = companies.findIndex(c => c.id === newCompany.id);
        if (idx !== -1) companies[idx] = { ...newCompany, status: "error", research_result: { error: err.message } };
        renderTable();
      }
      added++;
    }
    progress.textContent = `完了しました（${added}件追加）`;
    btn.disabled = false;
  }

  function showDetail(id) {
    const company = companies.find(c => c.id === id);
    if (!company || !company.research_result) return;
    const r = company.research_result;
    document.getElementById("modalTitle").textContent = company.name + " のリサーチ結果";
    const sourceLabel = r.mappingSource === "ai"
      ? '<span class="source-label source-ai">AI推定</span>'
      : '<span class="source-label source-heuristic">キーワード推定</span>';
    let html = `
      <dl class="info-grid">
        <dt>フォーム</dt><dd>${r.formFound ? "あり" : "なし"}</dd>
        <dt>CAPTCHA</dt><dd>${r.captchaDetected ? "<span style='color:#dc2626'>🔒 検出</span>" : "なし"}</dd>
        <dt>自動化可否</dt><dd>${r.automatable ? '<span class="badge badge-ok">✓ OK</span>' : '<span class="badge badge-ng">✕ NG</span>'}</dd>
        <dt>フォームページ</dt><dd>${r.formPageUrl ? `<a href="${esc(r.formPageUrl)}" target="_blank" rel="noopener">${esc(r.formPageUrl)}</a>` : "—"}</dd>
        ${r.aiError ? `<dt>AI推定エラー</dt><dd style="color:#dc2626">${esc(r.aiError)}</dd>` : ""}
      </dl>`;
    if (r.fieldMapping && r.fieldMapping.length > 0) {
      const fieldMap = {};
      (r.fieldMapping || []).forEach(m => { fieldMap[`${m.formIndex}:${m.name||""}:${m.id||""}`] = m; });
      const rows = (r.forms || []).flatMap(form => form.fields.map(f => {
        const m = fieldMap[`${form.formIndex}:${f.name||""}:${f.id||""}`];
        return { label: f.label||f.placeholder||"—", nameId: [f.name,f.id].filter(Boolean).join(" / ")||"—", type: f.type, role: m?m.role:"—", confidence: m?m.confidence:"—" };
      }));
      html += `<p class="fields-title">フィールド一覧 ${sourceLabel}</p>
      <table class="fields-table">
        <thead><tr><th>ラベル</th><th>name / id</th><th>type</th><th>推定役割</th><th>信頼度</th></tr></thead>
        <tbody>${rows.map(f => `<tr><td>${esc(f.label)}</td><td style="font-family:monospace;font-size:11px">${esc(f.nameId)}</td><td>${esc(f.type)}</td><td>${esc(f.role)}</td><td class="conf-${f.confidence}">${f.confidence}</td></tr>`).join("")}</tbody>
      </table>`;
    } else {
      html += `<p style="color:var(--gray-400);font-size:13px">フィールドマッピングデータがありません。</p>`;
    }
    document.getElementById("modalBody").innerHTML = html;
    document.getElementById("modal").classList.add("open");
  }

  function closeModal() { document.getElementById("modal").classList.remove("open"); }
  function closeModalOnOverlay(e) { if (e.target === document.getElementById("modal")) closeModal(); }
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  function esc(s) {
    return String(s||"")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function statusBadge(status) {
    const map = {
      pending:        { label: "未リサーチ",          cls: "badge-pending" },
      researching:    { label: "<span class='spinner'></span>リサーチ中...", cls: "badge-researching" },
      researched:     { label: "✓ 完了",              cls: "badge-researched" },
      no_form:        { label: "フォームなし",         cls: "badge-no_form" },
      captcha_blocked:{ label: "🔒 CAPTCHA",          cls: "badge-captcha" },
      error:          { label: "✕ エラー",            cls: "badge-error" },
    };
    const s = map[status] || { label: status, cls: "badge-pending" };
    return `<span class="badge ${s.cls}">${s.label}</span>`;
  }

  function automatableBadge(result) {
    if (!result || result.error) return '<span style="color:var(--gray-300)">—</span>';
    return result.automatable
      ? '<span class="badge badge-ok">✓ OK</span>'
      : '<span class="badge badge-ng">✕ NG</span>';
  }

  lucide.createIcons();
</script>
</body>
</html>
