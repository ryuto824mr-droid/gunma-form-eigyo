<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>フォーム解析 - LOCLE営業ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --green-500: #44B13F; --green-700: #2F8A2A;
    --green-50: #f0faf0;  --green-100: #d8f0d8;
    --gray-50: #f8fafc;   --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;  --gray-300: #cbd5e1;
    --gray-400: #94a3b8;  --gray-500: #64748b;
    --gray-700: #334155;  --gray-900: #0f172a;
    --white: #ffffff;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
    --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; }
  body { font-family: "Inter", "Noto Sans JP", sans-serif; background: var(--gray-50); margin: 0; color: var(--gray-900); }

  .page-header {
    background: var(--white); border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-sm); padding: 0 24px;
    display: flex; align-items: center; gap: 16px;
    height: 56px; position: sticky; top: 0; z-index: 100;
  }
  .page-header h1 {
    margin: 0; font-size: 15px; font-weight: 700;
    color: var(--green-700); flex-shrink: 0; letter-spacing: -0.01em;
  }
  .page-nav { display: flex; gap: 2px; margin-left: auto; flex-wrap: wrap; }
  .page-nav a {
    color: var(--gray-500); font-size: 13px; font-weight: 500;
    text-decoration: none; white-space: nowrap;
    padding: 6px 10px; border-radius: var(--radius-sm); transition: all 150ms;
  }
  .page-nav a:hover { color: var(--gray-900); background: var(--gray-100); }
  .page-nav a.active { color: var(--green-700); font-weight: 600; background: var(--green-50); }

  .main-content { max-width: 680px; margin: 32px auto; padding: 0 16px; }

  .page-card {
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 28px;
  }
  .page-card h2 {
    margin: 0 0 6px; font-size: 18px; font-weight: 700;
    color: var(--gray-900); letter-spacing: -0.02em;
  }
  .page-card p { margin: 0 0 20px; font-size: 14px; color: var(--gray-500); line-height: 1.6; }

  input[type="url"] {
    width: 100%; padding: 8px 12px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
    transition: border-color 150ms; background: var(--white); color: var(--gray-900);
  }
  input[type="url"]:focus {
    outline: none; border-color: var(--green-500);
    box-shadow: 0 0 0 3px var(--green-100);
  }
  button {
    margin-top: 10px; padding: 8px 16px;
    background: var(--green-500); color: var(--white);
    border: none; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: inherit;
    transition: all 150ms;
  }
  button:hover:not(:disabled) { background: var(--green-700); }
  button:disabled { background: var(--gray-300); cursor: not-allowed; }

  .status {
    margin-top: 14px; font-size: 13px; color: var(--gray-500);
    min-height: 20px;
  }
  pre {
    margin-top: 16px; background: var(--gray-50); border: 1px solid var(--gray-200);
    padding: 14px; border-radius: var(--radius-md); overflow-x: auto;
    font-size: 12px; white-space: pre-wrap; word-break: break-all;
    color: var(--gray-700); line-height: 1.6;
  }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 12px; font-weight: 600;
  }
  .ok { background: var(--green-50); color: var(--green-700); }
  .ng { background: #fff5f5; color: #dc2626; }

  @media (max-width: 600px) {
    .page-header { padding: 0 12px; }
    .page-nav { overflow-x: auto; padding-bottom: 2px; }
    .main-content { padding: 0 8px; margin: 16px auto; }
    input[type="url"] { font-size: 16px; }
    button { min-height: 44px; width: 100%; }
  }
</style>
</head>
<body>
<header class="page-header">
  <h1>LOCLE 営業ツール</h1>
  <nav class="page-nav">
    <a href="/index.html" class="active">フォーム解析</a>
    <a href="/companies.html">企業リスト</a>
    <a href="/variants.html">メッセージ管理</a>
    <a href="/send.html">送信管理</a>
    <a href="/analytics.html">分析</a>
  </nav>
</header>
<div class="main-content">
  <div class="page-card">
    <h2>フォーム解析テスト</h2>
    <p>企業サイトのURLを入力すると、お問い合わせフォームを探してフィールド構成と自動化可否を判定します。</p>
    <input type="url" id="urlInput" placeholder="https://example.co.jp" />
    <br />
    <button id="runBtn">解析する</button>
    <div class="status" id="status"></div>
    <pre id="result"></pre>
  </div>

  <script>
    const btn = document.getElementById("runBtn");
    const input = document.getElementById("urlInput");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    btn.addEventListener("click", async () => {
      const url = input.value.trim();
      if (!url) {
        statusEl.textContent = "URLを入力してください";
        return;
      }
      btn.disabled = true;
      statusEl.textContent = "解析中... (ヘッドレスブラウザでページを読み込んでいます。数秒~20秒程度かかります)";
      resultEl.textContent = "";

      try {
        const res = await fetch("/api/analyze-form", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();

        if (!res.ok) {
          statusEl.innerHTML = `<span class="badge ng">エラー</span> ${data.error || "不明なエラー"}`;
        } else {
          const badge = data.automatable
            ? '<span class="badge ok">自動化OK</span>'
            : '<span class="badge ng">自動化NG</span>';
          statusEl.innerHTML = `${badge} フォーム発見: ${data.formFound ? "あり" : "なし"} / CAPTCHA: ${data.captchaDetected ? "検出" : "なし"}`;
        }
        resultEl.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        statusEl.innerHTML = `<span class="badge ng">エラー</span> ${err.message}`;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</div>
</body>
</html>
